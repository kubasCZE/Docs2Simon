<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs2Simon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, system-ui, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
      min-height: 100vh;
    }

    .header {
      background: #1b2033;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    .section-header {
      padding: 8px 12px;
      background: #f1f3f4;
      border-bottom: 1px solid #e0e0e0;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5f6368;
    }

    .section-body { padding: 12px; }

    /* Validation */
    .doc-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .status-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-bottom: 5px;
      font-size: 12px;
      color: #444;
    }

    .status-icon {
      flex-shrink: 0;
      width: 15px; height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      margin-top: 1px;
    }

    .status-icon.ok    { background: #e6f4ea; color: #34a853; }
    .status-icon.error { background: #fce8e6; color: #ea4335; }
    .status-icon.info  { background: #e8f0fe; color: #4285f4; }

    .strategy-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      background: #e8f0fe;
      color: #4285f4;
    }

    .headings-list {
      margin-top: 8px;
      border-top: 1px solid #f0f0f0;
      padding-top: 8px;
    }

    .heading-item {
      display: flex;
      align-items: baseline;
      gap: 5px;
      padding: 2px 0;
      font-size: 11px;
      color: #444;
    }

    .heading-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      background: #f1f3f4;
      color: #5f6368;
    }
    .heading-badge.h1 { background: #e6f4ea; color: #34a853; }
    .heading-badge.h2 { background: #e8f0fe; color: #4285f4; }

    .error-message {
      background: #fce8e6;
      color: #c5221f;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Login */
    .login-form { display: flex; flex-direction: column; gap: 8px; }
    .form-field { display: flex; flex-direction: column; gap: 3px; }
    .form-field label { font-size: 11px; color: #5f6368; font-weight: 500; }

    input[type="text"], input[type="password"] {
      padding: 7px 9px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      color: #202124;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: #4285f4; box-shadow: 0 0 0 2px rgba(66,133,244,0.15); }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-secondary { background: #f1f3f4; color: #444; }
    .btn-secondary:hover { background: #e8eaed; }
    .btn-danger { background: #fce8e6; color: #c5221f; }
    .btn-danger:hover { background: #f5c6cb; }
    .btn-primary { background: #4285f4; color: #fff; width: 100%; margin-top: 2px; }
    .btn-primary:hover { background: #3367d6; }
    .btn-primary:disabled { background: #dadce0; color: #9aa0a6; cursor: not-allowed; }

    .logged-in-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .logged-in-user {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .user-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4285f4, #34a853);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .login-status-msg { margin-top: 6px; font-size: 11px; display: none; }

    /* Export */
    .btn-export {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      background: linear-gradient(135deg, #1b2033 0%, #3a4a7a 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-export:hover { opacity: 0.88; }
    .btn-export:disabled { background: #dadce0; color: #9aa0a6; cursor: not-allowed; opacity: 1; }

    .result-box {
      margin-top: 10px;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .result-box.success { background: #e6f4ea; color: #137333; border: 1px solid #c3e6cb; }
    .result-box.error   { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6cb; }
    .result-title { font-weight: 600; margin-bottom: 3px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    .spinner.dark { border-color: rgba(66,133,244,0.3); border-top-color: #4285f4; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .token-warning {
      background: #fef7e0;
      border: 1px solid #fbbc04;
      color: #7a5a00;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>

    <span class="header-title">Docs2Simon</span>

  <div class="content">

    <!-- Validace -->
    <div class="section">
      <div class="section-header">Analýza dokumentu</div>
      <div class="section-body" id="validationBody"></div>
    </div>

    <!-- Přihlášení -->
    <div class="section">
      <div class="section-header">Přihlášení do Simona</div>
      <div class="section-body">

        <div id="loginForm" class="login-form">
          <div class="form-field">
            <label for="usernameInput">Přihlašovací jméno</label>
            <input type="text" id="usernameInput" placeholder="jmeno@domena.cz" autocomplete="username" />
          </div>
          <div class="form-field">
            <label for="passwordInput">Heslo</label>
            <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Přihlásit se</button>
          <div id="loginStatusMsg" class="login-status-msg"></div>
        </div>

        <div id="loggedInBox" class="logged-in-box" style="display:none;">
          <div class="logged-in-user">
            <div class="user-avatar" id="userAvatar">?</div>
            <span id="usernameLabel">—</span>
          </div>
          <button class="btn btn-danger" onclick="doLogout()">Odhlásit</button>
        </div>

      </div>
    </div>

    <!-- Export -->
    <div class="section">
      <div class="section-header">Export do Simona</div>
      <div class="section-body">
        <button class="btn-export" id="exportBtn" onclick="startExport()" disabled>
          <span id="exportBtnContent">Exportovat do Simona</span>
        </button>
        <div id="tokenWarning" class="token-warning">
          OAuth token pro Drive může být expirovaný (platí 1 hod.). Zavřete a znovu otevřete sidebar.
        </div>
        <div id="exportResult" class="result-box"></div>
      </div>
    </div>

  </div>

  <script>
    // ── Data embedovaná server-side ──
    var VALIDATION   = <?!= validationJson ?>;
    var DOC_ID       = '<?!= docId ?>';
    var DOC_NAME     = <?!= docNameJson ?>;
    var OAUTH_TOKEN  = '<?!= oauthToken ?>';

    // ── Drive export (přímý fetch — CORS OK) ──
    var DRIVE_EXPORT_URL = 'https://www.googleapis.com/drive/v3/files/' + DOC_ID +
                           '/export?mimeType=application%2Fepub%2Bzip&alt=media';

    // ── google.script.run wrapper → Promise ──
    function scriptRun(fnName, args) {
      return new Promise(function(resolve, reject) {
        var runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(function(err) { reject(new Error(err.message || String(err))); });
        runner[fnName].apply(runner, args || []);
      });
    }

    // ── Simon auth z localStorage ──
    var simonToken    = localStorage.getItem('simonToken') || null;
    var simonUsername = localStorage.getItem('simonUsername') || null;

    // ── Init ──
    window.onload = function() {
      displayValidation(VALIDATION);
      if (simonToken) {
        showLoggedIn(simonUsername);
      } else {
        showLoginForm();
      }
      updateExportButton();
    };

    // ── Validace ──
    function displayValidation(data) {
      var body = document.getElementById('validationBody');
      var html = '<div class="doc-title">' + esc(data.docTitle) + '</div>';

      var h1h2 = data.headings.filter(function(h) {
        return h.level === 'HEADING1' || h.level === 'HEADING2';
      });

      if (data.valid) {
        html += statusRow('ok', '✓', 'Nalezeno <strong>' + data.headings.length + '</strong> nadpisů (' + h1h2.length + '× H1/H2)');
      } else {
        html += statusRow('error', '✗', 'Žádné nadpisy H1/H2');
      }

      html += statusRow(
        data.hasPageBreaks ? 'ok' : 'info',
        data.hasPageBreaks ? '✓' : 'i',
        data.hasPageBreaks ? 'Page breaky detekované' : 'Žádné page breaky'
      );

      html += statusRow('info', 'i',
        'Strategie: <span class="strategy-badge">' +
        (data.splitStrategy === 'pageBreaks' ? 'Page breaky' : 'Nadpisy') + '</span>');

      if (data.errors && data.errors.length > 0) {
        html += '<div class="error-message">' + esc(data.errors.join(' ')) + '</div>';
      }

      if (data.headings.length > 0) {
        html += '<div class="headings-list">';
        data.headings.slice(0, 10).forEach(function(h) {
          var level = h.level.replace('HEADING', 'H');
          var cls = level === 'H1' ? 'h1' : (level === 'H2' ? 'h2' : '');
          html += '<div class="heading-item"><span class="heading-badge ' + cls + '">' + level + '</span><span>' + esc(h.text || '(prázdný)') + '</span></div>';
        });
        if (data.headings.length > 10) {
          html += '<div style="color:#5f6368;font-size:11px;margin-top:4px;">… a dalších ' + (data.headings.length - 10) + ' nadpisů</div>';
        }
        html += '</div>';
      }

      body.innerHTML = html;
    }

    function statusRow(cls, icon, text) {
      return '<div class="status-row"><div class="status-icon ' + cls + '">' + icon + '</div><div>' + text + '</div></div>';
    }

    // ── Auth ──
    function showLoggedIn(username) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('loggedInBox').style.display = 'flex';
      document.getElementById('usernameLabel').textContent = username || '(neznámý)';
      document.getElementById('userAvatar').textContent = username ? username.charAt(0).toUpperCase() : '?';
    }

    function showLoginForm() {
      document.getElementById('loggedInBox').style.display = 'none';
      document.getElementById('loginForm').style.display = 'flex';
      document.getElementById('loginStatusMsg').style.display = 'none';
    }

    async function doLogin() {
      var username = document.getElementById('usernameInput').value.trim();
      var password = document.getElementById('passwordInput').value;

      if (!username || !password) {
        showLoginMsg('Zadejte přihlašovací jméno a heslo.', '#c5221f');
        return;
      }
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Přihlašuji…';

      try {
        var data = await scriptRun('proxyLogin', [username, password]);

        if (data.error) {
          showLoginMsg('Chyba: ' + data.error, '#c5221f');
          return;
        }

        if (data.Type === 'DATA') {
          simonToken = data.Data;
          simonUsername = decodeJwtUsername(simonToken) || username;
          localStorage.setItem('simonToken', simonToken);
          localStorage.setItem('simonUsername', simonUsername);
          document.getElementById('passwordInput').value = '';
          showLoggedIn(simonUsername);
          updateExportButton();
        } else {
          showLoginMsg(loginErrorMsg(data), '#c5221f');
        }
      } catch (err) {
        showLoginMsg('Chyba připojení k serveru: ' + err.message, '#c5221f');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Přihlásit se';
      }
    }

    function doLogout() {
      simonToken = null;
      simonUsername = null;
      localStorage.removeItem('simonToken');
      localStorage.removeItem('simonUsername');
      showLoginForm();
      updateExportButton();
    }

    function showLoginMsg(msg, color) {
      var el = document.getElementById('loginStatusMsg');
      el.style.display = 'block';
      el.style.color = color || '#202124';
      el.textContent = msg;
    }

    function loginErrorMsg(data) {
      if (data.Type === 'FAILED_VALIDATION') return 'Zadejte povinné údaje.';
      if (data.Type === 'ERROR') {
        switch (data.ErrorKey) {
          case 'login_invalid_credentials': return 'Špatné přihlašovací jméno nebo heslo.';
          case 'login_disabled':            return 'Tento účet nemá právo k přihlášení.';
          case 'login_locked_out':          return 'Účet byl dočasně uzamknut. Zkuste to později.';
        }
      }
      return 'Přihlášení selhalo.';
    }

    // ── Export ──
    function updateExportButton() {
      var btn = document.getElementById('exportBtn');
      btn.disabled = !(simonToken && VALIDATION && VALIDATION.valid);
    }

    async function startExport() {
      var btn = document.getElementById('exportBtn');
      var resultEl = document.getElementById('exportResult');
      var warningEl = document.getElementById('tokenWarning');

      btn.disabled = true;
      document.getElementById('exportBtnContent').innerHTML = '<div class="spinner"></div> Exportuji…';
      resultEl.style.display = 'none';
      warningEl.style.display = 'none';

      try {
        // 1. Export EPUB z Drive API (přímý fetch — CORS OK)
        var driveResp = await fetch(DRIVE_EXPORT_URL, {
          headers: { 'Authorization': 'Bearer ' + OAUTH_TOKEN }
        });

        if (driveResp.status === 401) {
          warningEl.style.display = 'block';
          throw new Error('OAuth token expiroval. Zavřete sidebar a otevřete ho znovu.');
        }
        if (!driveResp.ok) {
          var errText = await driveResp.text();
          throw new Error('EPUB export selhal (' + driveResp.status + '): ' + errText.substring(0, 200));
        }

        var epubBlob = await driveResp.blob();

        // 2. Převod blob → base64 pro přenos přes proxy
        var epubBase64 = await new Promise(function(resolve, reject) {
          var reader = new FileReader();
          reader.onload = function() {
            // výsledek je "data:...;base64,XXXX" — bereme jen část za čárkou
            resolve(reader.result.split(',')[1]);
          };
          reader.onerror = reject;
          reader.readAsDataURL(epubBlob);
        });

        // 3. Odeslání přes google.script.run proxy (bez CORS omezení)
        var fileName = DOC_NAME.replace(/\.[^.]+$/, '') + '.epub';

        var result = await scriptRun('proxyUpload', [epubBase64, fileName, simonToken]);

        if (result.error === 'session_expired' || result.code === 401) {
          doLogout();
          throw new Error('Relace Simona vypršela. Přihlaste se prosím znovu.');
        }
        if (result.error) {
          throw new Error(result.error);
        }

        resultEl.className = 'result-box success';
        resultEl.style.display = 'block';
        resultEl.innerHTML = '<div class="result-title">✓ Odesláno do Simona</div>' +
          esc((result && result.message) ? result.message : 'Úspěšně odesláno.');

      } catch (err) {
        resultEl.className = 'result-box error';
        resultEl.style.display = 'block';
        resultEl.innerHTML = '<div class="result-title">✗ Chyba při exportu</div>' + esc(err.message);
      } finally {
        btn.disabled = false;
        document.getElementById('exportBtnContent').textContent = 'Exportovat do Simona';
        updateExportButton();
      }
    }

    // ── JWT decode ──
    function decodeJwtUsername(token) {
      try {
        var payload = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        var decoded = JSON.parse(atob(payload));
        return decoded.username || null;
      } catch (e) {
        return null;
      }
    }

    // ── Utility ──
    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('loginForm').style.display !== 'none') {
        doLogin();
      }
    });
  </script>
</body>
